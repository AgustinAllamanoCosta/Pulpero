name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: run unit test
        run: ./test.sh
  
  build:
    runs-on: ubuntu-latest
    steps:

      - name: Docker Build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          platforms: linux/amd64,linux/arm64
          tags: "latest"
          labels: "test,CI"
